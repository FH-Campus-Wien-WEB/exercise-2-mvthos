<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>

    <!-- Link to the external stylesheet for the overview page -->
    <link rel="stylesheet" href="index.css" />
    <!-- Load the JavaScript that fetches and renders the movie cards -->
    <script src="index.js"></script>
</head>

<body>
    <!--
        HTML5 landmark elements describe the role of each page region.
        Screen readers and search engines use these to navigate the page.
        Their layout (single column on mobile, 2-column grid on desktop)
        is defined entirely in index.css using CSS Grid Template Areas.
    -->

    <!-- <header> identifies the introductory content / page heading -->
    <header>
        <h1>My Movies!</h1>
    </header>

    <!--
        <nav> wraps the navigation links/buttons. The genre buttons are
        added dynamically by index.js after fetching /genres from the server.
    -->
    <nav id="genre-nav"></nav>

    <!--
        <main> contains the primary content of the page (the movie cards).
        Cards are appended here by index.js after fetching /movies.
    -->
    <main id="movies-container"></main>

    <!--
        <footer> always visible
    -->
    <footer>
        <p>&copy; 2026 mvthos </p>
    </footer>
</body>

</html>
